<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Produtos</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        .galeria {display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:1rem; margin-top:1rem;}
        .produto {background:#fff; border-radius:8px; padding:1rem; text-align:center;}
        .produto img {width:100%; height:150px; object-fit:cover; border-radius:4px; background:#eee;}
        .produto h4 {margin:0.5rem 0; color:#1a237e;}
        .preco {color:#d32f2f; font-weight:bold; font-size:1.1rem;}
    </style>
</head>
<body>
    <header><h1>C & A TechStore</h1></header>
    <nav>
        <a href="index.html">Início</a>
        <a href="produtos.html">Produtos</a>
        <a href="galeria.html">Galeria</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
    </nav>

    <main>
        <h2>Produtos e Preços</h2>
        <div class="galeria">
            <div class="produto">
                <img src="Xiaomi-17-Pro-Max.png" alt="Celular">
                <h4>Celular Smart Pro</h4>
                <p class="preco">Kz 145.000</p>
            </div>
            <div class="produto">
                <img src="notebook-ultra.jpg" alt="Notebook">
                <h4>Notebook Ultra</h4>
                <p class="preco">Kz 280.000</p>
            </div>
            <div class="produto">
                <img src="images.jpeg" alt="Fone">
                <h4>Fone Bluetooth</h4>
                <p class="preco">Kz 35.000</p>
            </div>
            <div class="produto">
                <img src="OSW0027RM32D_6.jpg" alt="Smartwatch">
                <h4>Smartwatch</h4>
                <p class="preco">Kz 42.000</p>
            </div>
        </div>
    </main>

    <footer><p>&copy; 2026 C & A TechStore - Todos os direitos reservados  </p></footer>
</body>
</html>
