<<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer Pedido - C & A TechStore</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        .form-pedido {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-pedido label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
            color: #1a237e;
        }
        .form-pedido input, .form-pedido select {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.3rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-pedido button {
            margin-top: 1.5rem;
            width: 100%;
        }
        #msg {
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header><h1>C & A TechStore</h1></header>
    <nav>
        <a href="index.html">Início</a>
        <a href="produtos.html">Produtos</a>
        <a href="galeria.html">Galeria</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
    </nav>

    <main>
        <h2>Fazer Pedido</h2>
        <form class="form-pedido" id="formPedido">
            <label for="produto">Produto</label>
            <select id="produto" required>
                <option value="">-- Escolhe um produto --</option>
                <option value="Celular Smart Pro">Celular Smart Pro - Kz 145.000</option>
                <option value="Notebook Ultra">Notebook Ultra - Kz 280.000</option>
                <option value="Fone Bluetooth">Fone Bluetooth - Kz 35.000</option>
                <option value="Smartwatch">Smartwatch - Kz 42.000</option>
            </select>

            <label for="nome">Nome completo</label>
            <input type="text" id="nome" required>

            <label for="endereco">Endereço de entrega</label>
            <input type="text" id="endereco" required>

            <label for="telefone">Número de telefone</label>
            <input type="tel" id="telefone" required placeholder="9XX XXX XXX">

            <label for="dataPedido">Data do pedido</label>
            <input type="date" id="dataPedido" required>

            <button type="submit">Pedir</button>
            <p id="msg"></p>
        </form>
    </main>

    <footer><p>&copy; 2026 C & A TechStore - Todos os direitos reservados</p></footer>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, addDoc, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Se veio de produtos.html com ?produto=NomeDoProduto, pré-seleciona
        const params = new URLSearchParams(window.location.search);
        const produtoParam = params.get("produto");
        if (produtoParam) {
            const select = document.getElementById("produto");
            for (const opt of select.options) {
                if (opt.value === produtoParam) opt.selected = true;
            }
        }

        // Preenche a data do pedido automaticamente com o dia de hoje
        const campoData = document.getElementById("dataPedido");
        const hoje = new Date();
        const hojeFormatado = hoje.toISOString().split("T")[0];
        campoData.value = hojeFormatado;

        const form = document.getElementById("formPedido");
        const msg = document.getElementById("msg");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            msg.style.color = "#333";
            msg.textContent = "A enviar pedido...";

            const pedido = {
                produto: document.getElementById("produto").value,
                nome: document.getElementById("nome").value.trim(),
                endereco: document.getElementById("endereco").value.trim(),
                telefone: document.getElementById("telefone").value.trim(),
                dataPedido: document.getElementById("dataPedido").value,
                data: serverTimestamp(),
                status: "pendente"
            };

            try {
                await addDoc(collection(db, "pedidos"), pedido);
                msg.style.color = "green";
                msg.textContent = "Pedido enviado com sucesso! Entraremos em contacto em breve.";
                form.reset();
            } catch (err) {
                console.error(err);
                msg.style.color = "#d32f2f";
                msg.textContent = "Erro ao enviar pedido. Tenta novamente.";
            }
        });
    </script>
</body>
</html>
