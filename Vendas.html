<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Notificações Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f0f2f5;padding:20px;max-width:1000px;margin:0 auto}
.cab{background:#fff;padding:15px;border-radius:8px;margin-bottom:15px}
.btn{padding:6px 12px;border:none;border-radius:4px;cursor:pointer;margin:5px 5px 5px 0}
.btn-azul{background:#2563eb;color:#fff}
.btn-cinza{background:#e5e7eb}
.notif{background:#fff;padding:12px;border-radius:8px;margin-bottom:8px;border-left:4px solid #2563eb}
.nao-lida{background:#eff6ff;font-weight:500}
.data{color:#666;font-size:0.9em;margin-top:5px}
</style>
</head>
<body>

<div class="cab">
  <h2>🔔 Notificações</h2>
  <p>Total: 12 | Não lidas: 5</p>
  <button class="btn btn-azul" onclick="marcarTodas()">Marcar todas lidas</button>
  <button class="btn btn-cinza" onclick="location.reload()">Atualizar</button>
</div>

<div class="notif nao-lida">
  <strong>🛒 Novo Pedido #1042</strong>
  <p>Cliente: João Pedro | Produto: 2x Câmera de Segurança</p>
  <div class="data">Hoje, 11:45 | <button class="btn btn-cinza">Ver pedido</button></div>
</div>

<div class="notif">
  <strong>💳 Pagamento confirmado #1040</strong>
  <p>Pagamento via Multicaixa aprovado</p>
  <div class="data">Hoje, 09:20 | <button class="btn btn-cinza">Ver detalhes</button></div>
</div>

<script>
function marcarTodas(){document.querySelectorAll('.nao-lida').forEach(n=>n.classList.remove('nao-lida'))}
document.querySelectorAll('.notif').forEach(n=>n.onclick=()=>n.classList.remove('nao-lida'))
</script>
</body>
</html>
